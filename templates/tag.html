{% extends 'base.html' %}
{% block head %}
<meta name="description" content="{{ blogBase['title'] }} search page">
<title>{{ blogBase['title'] }} - Tag</title>
{% endblock %}

{% block style %}
<style>
.tagTitle{margin:auto 0;font-size:40px;font-weight:bold;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.title-right{display:flex;margin:auto 0 0 auto;}
.title-right .circle{padding: 14px 16px;margin-right:8px;}

.subnav-search{width:222px;margin-top:8px;margin-right:8px;}
.subnav-search-input{width:160px;border-top-right-radius:0px;border-bottom-right-radius:0px;}
.subnav-search button{padding:5px 8px;border-top-left-radius:0px;border-bottom-left-radius:0px;}

.SideNav-icon{margin-right:16px}
.Label{color: #fff;margin-left:4px;}
#taglabel .Label {margin-bottom:8px;}
.Counter{color:#fff;background-color:rgba(234, 238, 242, 0.5)}

.genTime{float: right;}
.d-flex{min-width:0;}
.listTitle{overflow:hidden;white-space:nowrap;text-overflow: ellipsis;max-width: 100%;}
.listLabels{white-space:nowrap;}

@media (max-width: 600px) {
    body { padding: 8px;}
    .tagTitle{display:none;}
    .LabelTime{display:none;}
}
</style>
{% endblock %}

{% block header %}
<span class="tagTitle"><span>Loading</span><span class="AnimatedEllipsis"></span></span>
<div class="title-right">
    <div class="subnav-search">
        <input type="search" class="form-control subnav-search-input float-left" aria-label="Search site" value="" style="height:32px;">
        <button class="btn float-left" type="submit" onclick="javascript:searchShow()">{{ i18n['Search'] }}</button>
        <svg class="subnav-search-icon octicon octicon-search" width="16" height="16" viewBox="0 0 16 16" aria-hidden="true">
            <path id="searchSVG" fill-rule="evenodd"></path>
        </svg>
    </div>
    <a href="{{ blogBase['homeUrl'] }}" id="buttonHome" class="btn btn-invisible circle" title="{{ i18n['home'] }}">
        <svg class="octicon" width="16" height="16">
            <path id="pathHome" fill-rule="evenodd"></path>
        </svg>
    </a>
    <a class="btn btn-invisible circle" onclick="modeSwitch()" title="{{ i18n['switchTheme'] }}" {%- if blogBase['themeMode']=='fix' -%}style="display:none;"{%- endif -%}>
        <svg class="octicon" width="16" height="16" >
            <path id="themeSwitch" fill-rule="evenodd"></path>
        </svg>
    </a>
</div>
{% endblock %}

{% block content %}
<div id="taglabel" style="margin-bottom:8px;"></div>
<nav class="SideNav"></nav>
<div class="notFind" style="display:none;font-size:24px;margin:8px;">Not Find</div>
{% endblock %}

{% block script %}
<script>
document.getElementById("pathHome").setAttribute("d",IconList["home"]);
document.getElementById("searchSVG").setAttribute("d",IconList["search"]);

let tagList=[];
let labelsCount={};
let jsonData={};
let posts=[];
let postRecords=[];
let postNodes=[];
let labelNodeMap={};
let searchIndex=[];
let searchTimer=null;
let currentLabel="All";

const requestJson="postList.json";
const request=new XMLHttpRequest();
request.open("GET",requestJson);
request.responseType='text';
request.send();
request.onload=function(){
    jsonData=JSON.parse(request.response);
    prepareData();
    renderTagButtons();
    renderPostList();
    const hashLabel=decodeURI(window.location.hash.slice(1));
    setClassDisplay(hashLabel==='' ? "All" : hashLabel);
}

function escapeHtml(text){
    return String(text).replace(/[&<>"']/g, function(s){
        return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[s];
    });
}

function prepareData(){
    labelsCount={"All":0};
    posts=[];
    const colorDict=jsonData['labelColorDict'] || {};
    colorDict["All"]="#000";

    for(const key in jsonData){
        if(key!=='labelColorDict' && Array.isArray(jsonData[key]['labels'])){
            const item=jsonData[key];
            posts.push(item);
            labelsCount["All"]+=1;
            for(const label of item['labels']){
                labelsCount[label]=(labelsCount[label] || 0)+1;
            }
        }
    }

    tagList=Object.keys(labelsCount).sort((a,b)=>labelsCount[b]-labelsCount[a]);
}

function renderTagButtons(){
    const taglabel=document.getElementById("taglabel");
    const colorDict=jsonData['labelColorDict'] || {};
    const htmlList=[];
    for(const label of tagList){
        const labelColor=colorDict[label] || "#000";
        htmlList.push(
            '<button class="Label" data-label="'+escapeHtml(label)+'" style="background-color:'+labelColor+';padding:4px;">'+
            '&nbsp;&nbsp;'+escapeHtml(label)+' <span class="Counter">'+labelsCount[label]+'</span></button>'
        );
    }
    taglabel.innerHTML=htmlList.join("");
}

function renderPostList(){
    const SideNav=document.getElementsByClassName("SideNav")[0];
    SideNav.classList.add("border");
    SideNav.innerHTML="";
    postNodes=[];
    postRecords=[];
    labelNodeMap={"All":[]};
    searchIndex=[];

    const fragment=document.createDocumentFragment();
    const colorDict=jsonData['labelColorDict'] || {};

    for(const item of posts){
        const labels=Array.isArray(item['labels']) ? item['labels'] : [];

        const div=document.createElement("div");
        div.setAttribute("class","lists");
        div.style.display="block";

        const itemLink=document.createElement("a");
        itemLink.setAttribute("class","SideNav-item d-flex flex-items-center flex-justify-between");
        itemLink.setAttribute("href",item['postUrl']);

        const center=document.createElement("div");
        center.setAttribute("class","d-flex flex-items-center");

        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        const path=document.createElementNS("http://www.w3.org/2000/svg","path");
        svg.setAttributeNS(null,"class","SideNav-icon octicon");
        svg.setAttributeNS(null,"style","width:16px;height:16px");
        path.setAttributeNS(null,"d",IconList["post"]);
        svg.appendChild(path);

        const title=document.createElement("span");
        title.setAttribute("class","listTitle");
        title.textContent=item['postTitle'];

        center.appendChild(svg);
        center.appendChild(title);

        const listLabels=document.createElement("div");
        listLabels.setAttribute("class","listLabels");

        for(const label of labels){
            const LabelName=document.createElement("span");
            LabelName.setAttribute("class","Label LabelName");
            LabelName.setAttribute("style","background-color:"+(colorDict[label] || "#000"));
            LabelName.textContent=label;
            listLabels.appendChild(LabelName);

            if(!labelNodeMap[label]){
                labelNodeMap[label]=[];
            }
            labelNodeMap[label].push(div);
        }

        const LabelTime=document.createElement("span");
        LabelTime.setAttribute("class","Label LabelTime");
        LabelTime.setAttribute("style","background-color:"+item['dateLabelColor']);
        LabelTime.textContent=item['createdDate'];
        listLabels.appendChild(LabelTime);

        itemLink.appendChild(center);
        itemLink.appendChild(listLabels);
        div.appendChild(itemLink);

        fragment.appendChild(div);
        postNodes.push(div);
        postRecords.push({node: div, labels: labels});
        labelNodeMap["All"].push(div);
        searchIndex.push((item['postTitle'] || "").toUpperCase());
    }

    SideNav.appendChild(fragment);
}

function showNodeSet(nodes){
    const showSet=new Set(nodes);
    for(const node of postNodes){
        node.style.display=showSet.has(node) ? 'block' : 'none';
    }
    document.getElementsByClassName("notFind")[0].style.display = nodes.length===0 ? 'block' : 'none';
}

function updateShowTag(label){
    if(window.location.hash.slice(1)!==encodeURI(label)){
        window.location.hash="#"+encodeURI(label);
        setClassDisplay(label);
    }
}

function setClassDisplay(label){
    if(!label){label="All";}
    currentLabel=label;
    const tagTitle=document.getElementsByClassName("tagTitle")[0];
    tagTitle.innerHTML="Tag #"+label;
    document.title=label+" - {{ blogBase['title'] }}";
    document.getElementsByClassName("subnav-search-input")[0].value='';

    if(label==="All"){
        showNodeSet(labelNodeMap["All"] || []);
        document.getElementsByClassName("notFind")[0].style.display='none';
    }
    else if(tagList.indexOf(label)!==-1){
        showNodeSet(labelNodeMap[label] || []);
        document.getElementsByClassName("notFind")[0].style.display='none';
    }
    else{
        document.getElementsByClassName("subnav-search-input")[0].value=label;
        searchShow();
    }
}

function getCurrentLabelNodes(){
    if(currentLabel==="All"){
        return labelNodeMap["All"] || [];
    }
    if(tagList.indexOf(currentLabel)!==-1){
        return labelNodeMap[currentLabel] || [];
    }
    return labelNodeMap["All"] || [];
}

function searchShow(){
    const tagTitle=document.getElementsByClassName("tagTitle")[0];
    const searchInput=document.getElementsByClassName("subnav-search-input")[0].value;
    tagTitle.innerHTML="Search #"+searchInput;
    document.title=searchInput==='' ? "Search - {{ blogBase['title'] }}" : searchInput+" - {{ blogBase['title'] }}";
    window.location.hash="#"+encodeURI(searchInput);

    const keyword=searchInput.toUpperCase();
    const scopeNodes=getCurrentLabelNodes();
    const scopeSet=new Set(scopeNodes);
    const matched=[];
    for(let i=0;i<postNodes.length;i++){
        if(!scopeSet.has(postNodes[i])){
            continue;
        }
        if(searchIndex[i].indexOf(keyword)!==-1){
            matched.push(postNodes[i]);
        }
    }

    showNodeSet(matched);
    if(matched.length===0){
        const notFind=document.getElementsByClassName("notFind")[0];
        notFind.style.display='block';
        notFind.innerHTML='Not Find "'+searchInput+'"';
    }
}

document.getElementById("taglabel").addEventListener("click",function(event){
    const labelButton=event.target.closest("button[data-label]");
    if(labelButton){
        updateShowTag(labelButton.getAttribute("data-label"));
    }
});

document.getElementsByClassName("subnav-search-input")[0].addEventListener("input",function(){
    if(searchTimer){
        clearTimeout(searchTimer);
    }
    searchTimer=setTimeout(function(){searchShow();},200);
});
</script>
{% endblock %}
